<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Topic - MusicLeague</title>

<link rel="stylesheet" href="styles.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.chartWrap{
  max-width:500px;
  margin:20px auto;
}
.smallChart{
  max-width:350px;
  margin:10px auto 30px auto;
}
.topicWinnerImg{
  width:100%;
  max-height:280px;
  object-fit:contain;
  border-radius:18px;
  border:1px solid var(--border);
  background:#0e0e16;
  padding:12px;
}
.selectWrap{
  display:flex;
  justify-content:center;
  margin:10px 0 20px 0;
}
select{
  padding:10px 14px;
  border-radius:12px;
  background:#1a1a28;
  color:white;
  border:1px solid var(--border);
  font-size:14px;
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="card card-users">
  <div class="cardPad" style="text-align:center;">

    <div style="display:flex; justify-content:center; margin-bottom:10px;">
      <div class="appIcon" style="
        width:60px;
        height:60px;
        border-radius:20px;
        font-size:28px;
        box-shadow:0 12px 40px rgba(0,0,0,.4);
      ">
        🏆
      </div>
    </div>

    <h1 style="
      margin:0;
      font-size:32px;
      letter-spacing:-0.5px;
      font-weight:800;
    ">
      Topic Hall
    </h1>

    <p style="
      margin-top:8px;
      color:var(--muted);
      font-size:15px;
    ">
      Vince il topic con più punti.
      I voti raccontano la preferenza.
      I punti decidono il risultato.
    </p>

  </div>
</div>

  <!-- SELETTORE MESE -->
  <div class="card">
  <div class="cardPad" style="text-align:center;">

    <div style="
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:12px 18px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(16px);
    ">

      <span style="font-weight:600;color:var(--muted2);">
        📅 Mese
      </span>

      <select id="monthSelect" style="
        background:transparent;
        border:none;
        color:white;
        font-size:16px;
        font-weight:600;
        outline:none;
        cursor:pointer;
      "></select>

    </div>

  </div>
</div>

  <!-- RISULTATI -->
  const html = `
  <div style="text-align:center;">

    <div style="
      display:inline-block;
      padding:6px 14px;
      border-radius:999px;
      background:rgba(255,215,0,.12);
      border:1px solid rgba(255,215,0,.4);
      font-size:13px;
      margin-bottom:14px;
      letter-spacing:.5px;
    ">
      🥇 VINCITORE
    </div>

    <h2 style="
      margin:0 0 14px 0;
      font-size:26px;
      font-weight:800;
      letter-spacing:-0.3px;
    ">
      ${winner.topic}
    </h2>

    <img src="assets/topics/${monthId}.png"
         class="topicWinnerImg"
         alt="Topic vincente">

  </div>

  <div class="chartWrap">
    <canvas id="pointsChart"></canvas>
  </div>

  <div class="smallChart">
    <canvas id="votesChart"></canvas>
  </div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>Topic</th>
          <th>Voti</th>
          <th>Punti</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d=>`
          <tr>
            <td>${d.topic}</td>
            <td>${d.voti}</td>
            <td class="points">${d.punti}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>
`;

</div>

<script>
const MANIFEST_URL = "data/topics/manifest.json";

function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const header = lines[0].split(";");
  return lines.slice(1).map(line=>{
    const cols = line.split(";");
    return {
      topic: cols[0],
      voti: parseInt(cols[1]),
      punti: parseInt(cols[2])
    };
  });
}

async function loadManifest(){
  const res = await fetch(MANIFEST_URL);
  return await res.json();
}

async function loadMonthData(id){
  const res = await fetch(`data/topics/${id}.csv`);
  const text = await res.text();
  return parseCSV(text);
}

function renderCharts(data, monthId){
  const winner = [...data].sort((a,b)=>b.punti-a.punti)[0];

  const html = `
    <h2 style="text-align:center;margin-top:0;">Vincitore: ${winner.topic}</h2>

    <img src="assets/topics/${monthId}.png"
         class="topicWinnerImg"
         alt="Topic vincente">

    <div class="chartWrap">
      <canvas id="pointsChart"></canvas>
    </div>

    <div class="smallChart">
      <canvas id="votesChart"></canvas>
    </div>

    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Topic</th>
            <th>Voti</th>
            <th>Punti</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(d=>`
            <tr>
              <td>${d.topic}</td>
              <td>${d.voti}</td>
              <td class="points">${d.punti}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById("resultsArea").innerHTML = html;

  new Chart(document.getElementById("pointsChart"),{
  type:"doughnut",
  data:{
    labels:data.map(d=>d.topic),
    datasets:[{
      data:data.map(d=>d.punti),
      backgroundColor:[
        "#7B7AFF",
        "#5AC8FA",
        "#FFD60A",
        "#FF375F",
        "#30D158"
      ],
      borderWidth:0
    }]
  },
  options:{
    cutout:"65%",
    plugins:{
      legend:{
        position:"bottom",
        labels:{
          color:"white",
          padding:20,
          font:{ size:14, weight:"600" }
        }
      }
    }
  }
});

  new Chart(document.getElementById("votesChart"),{
  type:"doughnut",
  data:{
    labels:data.map(d=>d.topic),
    datasets:[{
      data:data.map(d=>d.voti),
      backgroundColor:[
        "#7B7AFF88",
        "#5AC8FA88",
        "#FFD60A88",
        "#FF375F88",
        "#30D15888"
      ],
      borderWidth:0
    }]
  },
  options:{
    cutout:"60%",
    plugins:{
      legend:{
        position:"bottom",
        labels:{
          color:"white",
          padding:15,
          font:{ size:12 }
        }
      }
    }
  }
});
}

(async function init(){
  const manifest = await loadManifest();
  const select = document.getElementById("monthSelect");

  manifest.months.forEach(m=>{
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = m.label;
    select.appendChild(opt);
  });

  const last = manifest.months[manifest.months.length-1];
  select.value = last.id;

  async function update(){
    const data = await loadMonthData(select.value);
    renderCharts(data, select.value);
  }

  select.addEventListener("change", update);
  update();
})();
</script>

</body>
</html>
